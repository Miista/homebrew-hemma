version: 2

project_name: mirage

builds:
  - id: mirage
    main: .
    binary: mirage
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    ldflags:
      - -s -w -X mirage/internal/cli.Version={{.Version}}

archives:
  - id: default
    ids: [mirage]
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

nfpms:
  - id: mirage
    ids: [mirage]
    package_name: mirage
    vendor: Miista
    homepage: https://github.com/Miista/homebrew-sd
    maintainer: Miista <noreply@users.noreply.github.com>
    description: Generate split-horizon DNS (Pi-hole/dnsmasq) and Caddy site blocks from a declarative services.yaml
    license: MIT
    formats: [deb]
    bindir: /usr/bin
    # curl is used by `mirage measure` (shells out to the embedded measure.sh).
    recommends:
      - curl

checksum:
  name_template: checksums.txt

brews:
  - name: mirage
    repository:
      owner: Miista
      name: homebrew-sd
      token: "{{ .Env.GITHUB_TOKEN }}"
    directory: Formula
    commit_author:
      name: goreleaser-bot
      email: bot@goreleaser.com
    homepage: https://github.com/Miista/homebrew-sd
    description: Generate split-horizon DNS (Pi-hole/dnsmasq) and Caddy site blocks from a declarative services.yaml
    license: MIT
    install: |
      bin.install "mirage"
    test: |
      assert_match "mirage", shell_output("#{bin}/mirage version")
